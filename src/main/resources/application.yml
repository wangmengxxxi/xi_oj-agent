spring:
  application:
    name: springboot-init
  # 默认 dev 环境
  profiles:
    active: dev
  # session 配置
  session:
    # todo 取消注释开启分布式 session（须先配置 Redis）
    # store-type: redis
    # 30 天过期
    timeout: 2592000
    repository-type: redis
  # 数据库配置
  # todo 需替换配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oj_db
    username: root
    password: 123456
  # Redis 配置
  data:
    redis:
      database: 1
      host: localhost
      port: 6379
      timeout: 5000ms

  # 异步线程池（@Async 方法依赖，如 AiChatService.saveRecordAsync）
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 200
      thread-name-prefix: ai-async-
    # 定时任务线程池（@Scheduled 向量同步依赖）
    scheduling:
      pool:
        size: 3
      thread-name-prefix: ai-schedule-

  # 文件上传
  servlet:
    multipart:
      # 大小限制（PDF 文件较大，需要 50MB）
      max-file-size: 50MB
      max-request-size: 50MB
server:
  address: 0.0.0.0
  port: 8101
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
